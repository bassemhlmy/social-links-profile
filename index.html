<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>

  <main class="main">
    <article class="social-card">
      <img src="./images/avatar-jessica.jpeg" alt="Jessica Avatar" class="avatar">
      <h1 class="name">Jessica Randall</h1>
      <p class="location">London, United Kingdom</p>
      <p class="position">"Front-end developer and avid reader."</p>
      <a href="" class="social-links">GitHub</a>
      <a href="" class="social-links">Frontend Mentor</a>
      <a href="" class="social-links">LinkedIn</a>
      <a href="" class="social-links">Twitter</a>
      <a href="" class="social-links">Instagram</a>
    </article>
  </main>



  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Basssem Y.Helmy</a>.
  </footer>
</body>

</html>
